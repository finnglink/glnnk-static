<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream — Glnnk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #ff72ea;
      --accent-dim: rgba(255,114,234,0.08);
      --radius: 6px;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── STREAM CARD (unified for all states) ─────────────── */
    .stream-card {
      text-align: center;
      padding: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,114,234,0.03) 0%, transparent 100%);
    }

    /* Meta line: "Next Stream: topic" / topic only / blank space */
    .stream-meta {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
      min-height: 1.4em;
    }

    .stream-meta-topic {
      color: var(--accent);
      font-weight: 700;
    }

    /* Countdown numbers */
    .countdown-display {
      margin: 16px 0;
    }

    .countdown-time {
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
      color: #fff;
      word-break: break-word;
    }

    .countdown-time.is-empty { color: var(--muted); }
    .countdown-time.is-live  { color: var(--accent); }

    /* "until start" / "waiting for stream" — hidden but spacing preserved */
    .countdown-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 24px;
    }

    .countdown-label.invisible { visibility: hidden; }

    /* Date/time row */
    .stream-datetime-wrap {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 8px;
      min-height: 1.2em;
    }

    .stream-datetime-prefix {
      color: var(--muted);
      margin-right: 4px;
    }

    /* Timezone */
    .timezone-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 11px;
    }

    .timezone-display { color: var(--muted); }

    .timezone-edit-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 12px;
      opacity: 0.6;
      transition: opacity 0.2s;
      font-family: var(--font-mono);
    }

    .timezone-edit-btn:hover { opacity: 1; }

    /* Timezone modal */
    .timezone-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .timezone-modal.active { opacity: 1; pointer-events: all; }

    .timezone-modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 400px;
      width: 90%;
    }

    .timezone-modal h3 { margin-bottom: 20px; font-size: 16px; }

    .timezone-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .timezone-btn {
      padding: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-mono);
      transition: all 0.15s;
    }

    .timezone-btn:hover { border-color: var(--accent); color: var(--accent); }
    .timezone-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

    /* ── BUTTONS ──────────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; }
    .btn-primary:hover { background: rgba(255,114,234,0.9); color: #000; }

    /* ── NOTIFICATIONS ────────────────────────────────────── */
    .notif-section {
      position: relative;
      display: inline-flex;
    }

    .btn-notif.enabled {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    /* Dropdown — sibling of button, shown on .notif-section:hover */
    .notif-settings {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }

    /* Bridge gap between dropdown and button */
    .notif-settings::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      height: 12px;
    }

    .notif-section:hover .notif-settings {
      opacity: 1;
      pointer-events: all;
    }

    .notif-disable-all {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border: none;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      background: none;
      font-family: var(--font-mono);
    }

    .notif-disable-all:not(:disabled):hover { color: var(--text); }
    .notif-disable-all:disabled { opacity: 0.3; cursor: default; }

    .notif-settings label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      cursor: pointer;
    }

    .notif-settings label:last-of-type { margin-bottom: 0; }

    .notif-settings input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 600px) {
      .stream-card { padding: 32px 20px; }
      .countdown-time { font-size: clamp(32px, 9vw, 56px); }
      .actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      .timezone-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- STREAM CARD — unified layout for all states -->
    <div class="stream-card">
      <div class="stream-meta" id="stream-meta"></div>

      <div class="countdown-display">
        <div class="countdown-time" id="countdown-value">--:--:--</div>
        <div class="countdown-label" id="countdown-label">until start</div>
      </div>

      <div class="stream-datetime-wrap">
        <span class="stream-datetime-prefix" id="datetime-prefix"></span
        ><span id="stream-datetime"></span>
      </div>

      <div class="timezone-selector">
        <span class="timezone-display">
          <span id="timezone-display">Loading...</span>
          <button class="timezone-edit-btn" id="timezone-edit-btn">✎ change timezone</button>
        </span>
      </div>

      <div class="actions">
        <a id="watch-btn" href="#" class="btn btn-primary"
           target="_blank" rel="noopener noreferrer">Watch Stream</a>
        <div class="notif-section">
          <button id="notif-btn" class="btn btn-notif">
            <span id="notif-btn-label">🔔 Enable Notifications</span>
          </button>
          <div class="notif-settings">
            <button class="notif-disable-all" id="notif-disable-all" disabled>disable all</button>
            <label><input type="checkbox" id="notif-announced" /><span>Stream announced</span></label>
            <label><input type="checkbox" id="notif-1hour" /><span>1 hour before</span></label>
            <label><input type="checkbox" id="notif-live" /><span>Starting now</span></label>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- TIMEZONE MODAL -->
  <div id="timezone-modal" class="timezone-modal">
    <div class="timezone-modal-content">
      <h3>Select your timezone</h3>
      <div class="timezone-list" id="timezone-list"></div>
      <button class="btn btn-primary" style="width:100%;"
              onclick="document.getElementById('timezone-modal').classList.remove('active')">
        Done
      </button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================

    const CONFIG_URLS = [
      'https://raw.githubusercontent.com/finnglink/glnnk-static/refs/heads/main/live/countdown-data.json',
      '/live/countdown-data.json'
    ];

    const YT_API_KEY = 'AIzaSyBtEyuTqvTlUSc1RnKRE9aGtGMh3cwples';

    let config = {
      nextStreamTime: null,
      streamLink: 'https://www.youtube.com/channel/UCZ2HgIUmKPHZ7VuAlOBPoWw/live',
      topic: '',
      isLive: false,
      liveUntil: null
    };

    // ── YouTube live detection state ──
    let liveVideoId = null;
    let ytSearchTimer = null;
    let ytPollTimer  = null;

    // ── Notification settings ──
    const notifDefaults = { announced: false, oneHourBefore: false, liveNow: false };
    let notifSettings = JSON.parse(
      localStorage.getItem('streamNotifSettings') || JSON.stringify(notifDefaults)
    );
    let lastAnnouncedStreamTime  = localStorage.getItem('lastAnnouncedStreamTime')  || null;
    let lastOneHourStreamTime    = localStorage.getItem('lastOneHourStreamTime')    || null;
    let lastLiveNotifVideoId     = localStorage.getItem('lastLiveNotifVideoId')     || null;

    // ── Timezone ──
    const TIMEZONES = [
      'Europe/Berlin', 'Europe/London', 'Europe/Paris',
      'America/New_York', 'America/Los_Angeles', 'America/Toronto',
      'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Hong_Kong',
      'Australia/Sydney', 'Australia/Melbourne'
    ];
    let userTimezone = localStorage.getItem('userTimezone')
      || Intl.DateTimeFormat().resolvedOptions().timeZone;

    // ── Last known stream time (for empty state "Last stream:") ──
    let lastStreamTime = localStorage.getItem('lastStreamTime') || null;

    // ============================================================
    // FETCH CONFIG
    // ============================================================

    async function loadConfig() {
      for (const url of CONFIG_URLS) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) continue;
          config = await res.json();
          onConfigLoaded();
          return;
        } catch (e) { continue; }
      }
      console.error('All config URLs failed');
      renderState('empty');
    }

    function onConfigLoaded() {
      if (config.nextStreamTime) {
        lastStreamTime = config.nextStreamTime;
        localStorage.setItem('lastStreamTime', config.nextStreamTime);
      }
      manageYouTubePolling();
      updateDisplay();
    }

    // ============================================================
    // YOUTUBE LIVE DETECTION
    // ============================================================

    function getChannelId() {
      const m = (config.streamLink || '').match(/youtube\.com\/channel\/([A-Za-z0-9_-]+)/);
      return m ? m[1] : null;
    }

    async function searchForLive() {
      const channelId = getChannelId();
      if (!channelId || !YT_API_KEY) return;
      try {
        const url = `https://www.googleapis.com/youtube/v3/search`
          + `?part=id&channelId=${channelId}&eventType=live&type=video&key=${YT_API_KEY}`;
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();

        if (data.items && data.items.length > 0) {
          const videoId = data.items[0].id.videoId;
          if (videoId && videoId !== liveVideoId) {
            liveVideoId = videoId;
            onStreamWentLive(videoId);
          }
        } else if (liveVideoId) {
          // Was live but now no results — confirm with videos.list before clearing
        }
      } catch (e) { console.error('YT search error:', e); }
    }

    async function pollLiveStatus() {
      if (!liveVideoId || !YT_API_KEY) return;
      try {
        const url = `https://www.googleapis.com/youtube/v3/videos`
          + `?part=liveStreamingDetails&id=${liveVideoId}&key=${YT_API_KEY}`;
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          onStreamEnded(); return;
        }
        const details = data.items[0].liveStreamingDetails;
        if (details && details.actualEndTime) {
          onStreamEnded();
        }
      } catch (e) { console.error('YT poll error:', e); }
    }

    function onStreamWentLive(videoId) {
      // Switch from expensive search to cheap poll
      clearInterval(ytSearchTimer); ytSearchTimer = null;
      clearInterval(ytPollTimer);
      ytPollTimer = setInterval(pollLiveStatus, 30000);

      renderState('live');

      // Fire live notification once per video
      if (notifSettings.liveNow
          && 'Notification' in window
          && Notification.permission === 'granted'
          && lastLiveNotifVideoId !== videoId) {
        new Notification('Stream is Live Now!', {
          body: config.topic || 'Glnnk is live — join the stream!'
        });
        lastLiveNotifVideoId = videoId;
        localStorage.setItem('lastLiveNotifVideoId', videoId);
      }
    }

    function onStreamEnded() {
      liveVideoId = null;
      clearInterval(ytPollTimer); ytPollTimer = null;
      config.isLive = false;
      config.nextStreamTime = null;
      config.topic = '';
      renderState('empty');
    }

    function manageYouTubePolling() {
      if (!YT_API_KEY || liveVideoId) return; // already in poll mode

      const now = new Date();
      const streamTime = config.nextStreamTime ? new Date(config.nextStreamTime) : null;
      const diffMs = streamTime ? (streamTime - now) : null;

      // Near stream time: ±1 hour → check every 3 min (100 units × 40 calls = 4,000 units/window)
      // No stream scheduled: check every 15 min (100 units × 96 calls = 9,600 units/day)
      const inWindow = diffMs !== null && Math.abs(diffMs) < 60 * 60 * 1000;
      const interval = inWindow ? 3 * 60 * 1000 : 15 * 60 * 1000;

      if (ytSearchTimer) { clearInterval(ytSearchTimer); ytSearchTimer = null; }
      ytSearchTimer = setInterval(searchForLive, interval);
      searchForLive(); // immediate check
    }

    // ============================================================
    // DISPLAY
    // ============================================================

    function updateDisplay() {
      // YouTube API takes precedence
      if (liveVideoId) { renderState('live'); return; }

      const now = new Date();
      const streamTime = config.nextStreamTime ? new Date(config.nextStreamTime) : null;

      // Manual isLive fallback (no API key or API not yet triggered)
      if (config.isLive && config.liveUntil) {
        if (now < new Date(config.liveUntil)) { renderState('live'); return; }
        else { config.isLive = false; }
      }

      if (!streamTime) { renderState('empty'); return; }

      // Countdown (positive or negative — no auto-live transition, API handles that)
      renderState('countdown');
    }

    function renderState(state) {
      const timerEl   = document.getElementById('countdown-value');
      const labelEl   = document.getElementById('countdown-label');
      const metaEl    = document.getElementById('stream-meta');
      const prefixEl  = document.getElementById('datetime-prefix');
      const dtEl      = document.getElementById('stream-datetime');
      const watchBtn  = document.getElementById('watch-btn');

      watchBtn.href = config.streamLink;

      if (state === 'empty') {
        metaEl.innerHTML = '&nbsp;';
        timerEl.textContent = 'No planned stream';
        timerEl.className = 'countdown-time is-empty';
        labelEl.textContent = 'until start';
        labelEl.className = 'countdown-label invisible';

        if (lastStreamTime) {
          prefixEl.textContent = 'Last stream:';
          dtEl.textContent = ' ' + formatTime(new Date(lastStreamTime));
        } else {
          prefixEl.textContent = '';
          dtEl.textContent = '';
        }
        watchBtn.textContent = 'Visit Channel';

      } else if (state === 'countdown') {
        const streamTime = new Date(config.nextStreamTime);
        const now = new Date();
        const diff = streamTime - now;

        // Meta
        setMeta(metaEl, 'Next Stream:', config.topic);

        // Timer (updated every second by interval)
        timerEl.className = 'countdown-time';
        updateTimer(streamTime);

        // Label
        labelEl.className = 'countdown-label';
        labelEl.textContent = diff < 0 ? 'waiting for stream' : 'until start';

        // Datetime
        prefixEl.textContent = '';
        dtEl.textContent = formatTime(streamTime);

        watchBtn.textContent = 'Watch Stream';

      } else if (state === 'live') {
        // Meta: topic only, accent, no label
        if (config.topic) {
          metaEl.textContent = '';
          const span = document.createElement('span');
          span.className = 'stream-meta-topic';
          span.textContent = config.topic;
          metaEl.appendChild(span);
        } else {
          metaEl.innerHTML = '&nbsp;';
        }

        timerEl.textContent = 'Streaming Now';
        timerEl.className = 'countdown-time is-live';
        labelEl.textContent = 'until start';
        labelEl.className = 'countdown-label invisible';

        // Datetime
        prefixEl.textContent = '';
        dtEl.textContent = config.nextStreamTime ? formatTime(new Date(config.nextStreamTime)) : '';

        watchBtn.textContent = 'Watch Stream';
      }
    }

    function setMeta(el, label, topic) {
      el.textContent = '';
      const labelSpan = document.createTextNode(label);
      el.appendChild(labelSpan);
      if (topic) {
        el.appendChild(document.createTextNode(' '));
        const topicSpan = document.createElement('span');
        topicSpan.className = 'stream-meta-topic';
        topicSpan.textContent = topic;
        el.appendChild(topicSpan);
      }
    }

    function updateTimer(streamTime) {
      const timerEl = document.getElementById('countdown-value');
      const labelEl = document.getElementById('countdown-label');
      if (!timerEl || timerEl.className !== 'countdown-time') return;

      const diff = streamTime - new Date();
      const abs  = Math.abs(diff);
      const h = Math.floor(abs / 3600000);
      const m = Math.floor((abs % 3600000) / 60000);
      const s = Math.floor((abs % 60000) / 1000);
      const sign = diff < 0 ? '-' : '';

      timerEl.textContent =
        `${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

      if (diff < 0) {
        labelEl.textContent = 'waiting for stream';
      } else {
        labelEl.textContent = 'until start';
      }
    }

    function formatTime(date) {
      return new Intl.DateTimeFormat(navigator.language, {
        timeZone: userTimezone,
        weekday: 'long', year: 'numeric', month: 'long',
        day: 'numeric', hour: '2-digit', minute: '2-digit'
      }).format(date);
    }

    // ============================================================
    // TIMEZONE SELECTOR
    // ============================================================

    function initTimezone() {
      const list = document.getElementById('timezone-list');
      TIMEZONES.forEach(tz => {
        const btn = document.createElement('button');
        btn.className = 'timezone-btn' + (tz === userTimezone ? ' active' : '');
        btn.textContent = tz;
        btn.onclick = () => {
          userTimezone = tz;
          localStorage.setItem('userTimezone', tz);
          list.querySelectorAll('.timezone-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadConfig();
          document.getElementById('timezone-display').textContent = tz;
        };
        list.appendChild(btn);
      });

      document.getElementById('timezone-edit-btn').onclick = () =>
        document.getElementById('timezone-modal').classList.add('active');

      document.getElementById('timezone-modal').onclick = e => {
        if (e.target.id === 'timezone-modal')
          e.target.classList.remove('active');
      };

      document.getElementById('timezone-display').textContent = userTimezone;
    }

    // ============================================================
    // NOTIFICATIONS
    // ============================================================

    function initNotifications() {
      const btn      = document.getElementById('notif-btn');
      const announced = document.getElementById('notif-announced');
      const oneHour  = document.getElementById('notif-1hour');
      const live     = document.getElementById('notif-live');

      announced.checked = notifSettings.announced;
      oneHour.checked   = notifSettings.oneHourBefore;
      live.checked      = notifSettings.liveNow;

      const persist = () => {
        localStorage.setItem('streamNotifSettings', JSON.stringify(notifSettings));
        updateNotifUI();
      };

      announced.onchange = () => { notifSettings.announced      = announced.checked; persist(); };
      oneHour.onchange   = () => { notifSettings.oneHourBefore  = oneHour.checked;   persist(); };
      live.onchange      = () => { notifSettings.liveNow        = live.checked;       persist(); };

      // Click the button = enable all + request permission, but only if all are off
      btn.onclick = () => {
        const anyOn = Object.values(notifSettings).some(Boolean);
        if (anyOn) return; // some are manually set — do nothing, let dropdown handle it
        notifSettings.announced     = true;
        notifSettings.oneHourBefore = true;
        notifSettings.liveNow       = true;
        announced.checked = oneHour.checked = live.checked = true;
        if ('Notification' in window && Notification.permission !== 'granted') {
          Notification.requestPermission().then(() => persist());
        } else {
          persist();
        }
      };

      document.getElementById('notif-disable-all').onclick = e => {
        e.stopPropagation();
        notifSettings.announced = notifSettings.oneHourBefore = notifSettings.liveNow = false;
        announced.checked = oneHour.checked = live.checked = false;
        persist();
      };

      updateNotifUI();
    }

    function updateNotifUI() {
      const btn      = document.getElementById('notif-btn');
      const label    = document.getElementById('notif-btn-label');
      const disableBtn = document.getElementById('notif-disable-all');
      const anyOn    = Object.values(notifSettings).some(Boolean);

      disableBtn.disabled = !anyOn;

      const granted = 'Notification' in window && Notification.permission === 'granted';
      const denied  = 'Notification' in window && Notification.permission === 'denied';

      if (anyOn && granted) {
        btn.classList.add('enabled');
        label.textContent = '🔔 Notifications Enabled';
      } else if (denied) {
        btn.classList.remove('enabled');
        label.textContent = '🔔 Notifications Blocked';
      } else {
        btn.classList.remove('enabled');
        label.textContent = '🔔 Enable Notifications';
      }
    }

    function checkAndNotify() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;

      const streamTime = config.nextStreamTime ? new Date(config.nextStreamTime) : null;
      const diff = streamTime ? (streamTime - new Date()) : null;

      // Stream announced — once per nextStreamTime
      if (notifSettings.announced && streamTime
          && lastAnnouncedStreamTime !== config.nextStreamTime) {
        new Notification('New Stream Announced!', {
          body: config.topic ? `"${config.topic}" coming up` : 'Stream coming up'
        });
        lastAnnouncedStreamTime = config.nextStreamTime;
        localStorage.setItem('lastAnnouncedStreamTime', config.nextStreamTime);
      }

      // 1 hour before — once per nextStreamTime
      if (notifSettings.oneHourBefore && diff !== null
          && diff > 0 && diff <= 3600000
          && lastOneHourStreamTime !== config.nextStreamTime) {
        new Notification('Stream Starting Soon!', {
          body: 'Starts in 1 hour'
        });
        lastOneHourStreamTime = config.nextStreamTime;
        localStorage.setItem('lastOneHourStreamTime', config.nextStreamTime);
      }

      // Live notification is fired by onStreamWentLive(), not here
    }

    // ============================================================
    // INIT
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      initTimezone();
      initNotifications();
      loadConfig();

      // Reload config every 10s
      setInterval(loadConfig, 10000);

      // Tick countdown every second
      setInterval(() => {
        if (config.nextStreamTime && !liveVideoId && !config.isLive) {
          updateTimer(new Date(config.nextStreamTime));
        }
      }, 1000);

      // Check notifications every 15s
      setInterval(checkAndNotify, 15000);
    });
  </script>
</body>
</html>
