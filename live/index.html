<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live — Glnnk</title>
  <meta name="description" content="Glnnk livestreams — upcoming streams and live broadcasts." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --border-bright: #3a3a3a;
      --text: #e8e4dc;
      --muted: #555;
      --muted2: #888;
      --accent: #ff72ea;
      --accent-dim: rgba(255, 114, 234, 0.08);
      --accent-border: rgba(255, 114, 234, 0.3);
      --live: #ff4545;
      --live-dim: rgba(255, 69, 69, 0.1);
      --green: #68ffb6;
      --discord: #5865F2;
      --discord-dim: rgba(88, 101, 242, 0.12);
      --radius: 6px;
      --font: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    /* ── PAGE SHELL ── */
    .page {
      width: 100%;
      max-width: 580px;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 48px;
    }

    .site-title {
      font-size: 11px;
      color: var(--muted2);
      text-decoration: none;
      letter-spacing: 0.08em;
    }
    .site-title:hover { color: var(--accent); }

    .header-sep { color: var(--muted); font-size: 11px; }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    /* ── CONTENT AREA ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 260px;
      justify-content: center;
    }

    /* ── STATUS LINE ── */
    .status-line {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 28px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-off   { background: var(--muted); }
    .dot-on    { background: var(--accent); }
    .dot-live  {
      background: var(--live);
      box-shadow: 0 0 6px var(--live);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── STREAM CARD ── */
    .stream-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      max-width: 440px;
      margin-bottom: 8px;
    }

    .stream-date {
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: 0.07em;
      margin-bottom: 36px;
    }

    /* ── COUNTDOWN ── */
    .countdown {
      font-size: 52px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .countdown-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* ── EMPTY STATE ── */
    .empty-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .empty-sub {
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.75;
      max-width: 360px;
      margin-bottom: 0;
    }

    /* ── LIVE STATE ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--live-dim);
      border: 1px solid rgba(255, 69, 69, 0.25);
      color: var(--live);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .live-sub {
      font-size: 12px;
      color: var(--muted2);
      margin-bottom: 36px;
      margin-top: 8px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0e;
      font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.85; }

    .btn-green {
      background: var(--green);
      color: #0e0e0e;
      font-weight: 600;
    }
    .btn-green:hover { opacity: 0.85; }

    .btn-discord {
      background: var(--discord-dim);
      border: 1px solid rgba(88, 101, 242, 0.3);
      color: #8b95f5;
    }
    .btn-discord:hover { opacity: 0.8; }

    /* ── UPCOMING LIST (accordion) ── */
    .upcoming-wrap {
      width: 100%;
      max-width: 460px;
      margin-top: 24px;
    }

    .upcoming-toggle {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted2);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.07em;
      padding: 10px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s, color 0.15s;
    }
    .upcoming-toggle:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .toggle-icon {
      font-size: 9px;
      transition: transform 0.2s;
    }
    .upcoming-toggle.open .toggle-icon {
      transform: rotate(180deg);
    }

    .upcoming-list {
      display: none;
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .upcoming-list.visible { display: block; }

    .upcoming-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .upcoming-item:last-child { border-bottom: none; }
    .upcoming-item:hover { background: var(--surface); }

    .upcoming-item-title {
      font-size: 11px;
      color: var(--text);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upcoming-item-date {
      font-size: 10px;
      color: var(--muted2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── LOADING ── */
    .loading {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: fade 1.2s ease-in-out infinite alternate;
    }
    @keyframes fade {
      from { opacity: 0.4; }
      to   { opacity: 1; }
    }

    /* ── MOCK BANNER (dev only) ── */
    .mock-banner {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255,114,234,0.15);
      border: 1px solid var(--accent-border);
      color: var(--accent);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .countdown { font-size: 40px; }
      .stream-title { font-size: 17px; }
      .btn-row { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <a href="/" class="site-title">glnnk.art</a>
    <span class="header-sep">/</span>
    <h1>live</h1>
  </header>

  <div class="content" id="content">
    <div class="loading">loading...</div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const API_URL    = 'https://glnnk.art/live/api/streams';
const YT_BASE    = 'https://youtube.com/channel/UCZ2HgIUmKPHZ7VuAlOBPoWw';
const DISCORD    = 'https://discord.com/invite/Ev5PCxHXZY';
const POLL_MS    = 60_000; // re-fetch every 60 seconds

// ── MOCK DATA (for testing without real streams) ──────────────────────────
// Add ?mock=empty | ?mock=one | ?mock=multi | ?mock=live to the URL
const MOCKS = {
  empty: { live: [], upcoming: [] },
  one: {
    live: [],
    upcoming: [
      {
        id: 'mock1',
        title: 'Building a Eurorack Filter from Scratch',
        scheduledStart: new Date(Date.now() + 18.75 * 3600 * 1000).toISOString(),
        url: YT_BASE,
      },
    ],
  },
  multi: {
    live: [],
    upcoming: [
      {
        id: 'mock1',
        title: 'Building a Eurorack Filter from Scratch',
        scheduledStart: new Date(Date.now() + 18.75 * 3600 * 1000).toISOString(),
        url: YT_BASE,
      },
      {
        id: 'mock2',
        title: 'SK-1 MIDI Mod — Live Build Session',
        scheduledStart: new Date(Date.now() + 8 * 24 * 3600 * 1000).toISOString(),
        url: YT_BASE,
      },
      {
        id: 'mock3',
        title: '3D Printing for Musicians Q&A',
        scheduledStart: new Date(Date.now() + 16 * 24 * 3600 * 1000).toISOString(),
        url: YT_BASE,
      },
    ],
  },
  live: {
    live: [
      {
        id: 'mockL',
        title: 'Building a Eurorack Filter from Scratch',
        actualStart: new Date(Date.now() - 42 * 60 * 1000).toISOString(),
        url: YT_BASE,
      },
    ],
    upcoming: [],
  },
};

// ── STATE ─────────────────────────────────────────────────────────────────
let countdownInterval = null;
let currentStream     = null;
let accordionOpen     = false;

// ── INIT ──────────────────────────────────────────────────────────────────
const mockParam = new URLSearchParams(location.search).get('mock');

if (mockParam && MOCKS[mockParam]) {
  document.body.insertAdjacentHTML('beforeend', `<div class="mock-banner">mock: ${mockParam}</div>`);
  render(MOCKS[mockParam]);
} else {
  fetchAndRender();
  setInterval(fetchAndRender, POLL_MS);
}

async function fetchAndRender() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    render(data);
  } catch (err) {
    console.error('Fetch error:', err);
    // Keep existing state on error, don't blank the page
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(data) {
  if (data.live && data.live.length > 0) {
    renderLive(data.live[0]);
  } else if (data.upcoming && data.upcoming.length > 0) {
    renderUpcoming(data.upcoming);
  } else {
    renderEmpty();
  }
}

// ── STATE A: NOTHING ──────────────────────────────────────────────────────
function renderEmpty() {
  clearCountdown();
  document.getElementById('content').innerHTML = `
    <div class="status-line">
      <span class="dot dot-off"></span>
      No stream scheduled
    </div>
    <div class="empty-title">Nothing here yet.</div>
    <div class="empty-sub">
      Subscribe on YouTube to get notified when I go live.<br>
      Stream announcements also land in my Discord first.
    </div>
    <div class="btn-row" style="margin-top:28px;">
      <a href="${YT_BASE}?sub_confirmation=1" target="_blank" rel="noopener" class="btn btn-primary">
        ↗ Subscribe on YouTube
      </a>
      <a href="${DISCORD}" target="_blank" rel="noopener" class="btn btn-discord">
        ⬡ Join my Discord
      </a>
    </div>
  `;
}

// ── STATE B+C: UPCOMING ───────────────────────────────────────────────────
function renderUpcoming(streams) {
  const next  = streams[0];
  const rest  = streams.slice(1);
  currentStream = next;

  clearCountdown();

  const dateStr = formatDate(next.scheduledStart);

  let upcomingHTML = '';
  if (rest.length > 0) {
    const label = rest.length === 1 ? '1 more stream announced' : `${rest.length} more streams announced`;
    const items = rest.map(s => `
      <a href="${s.url}" target="_blank" rel="noopener" class="upcoming-item">
        <span class="upcoming-item-title">${escHtml(s.title)}</span>
        <span class="upcoming-item-date">${formatDateShort(s.scheduledStart)}</span>
      </a>
    `).join('');

    upcomingHTML = `
      <div class="upcoming-wrap">
        <button class="upcoming-toggle" id="upcoming-toggle">
          <span>${label}</span>
          <span class="toggle-icon">▼</span>
        </button>
        <div class="upcoming-list" id="upcoming-list">
          ${items}
        </div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = `
    <div class="status-line">
      <span class="dot dot-on"></span>
      ${rest.length > 0 ? 'Next up' : 'Upcoming stream'}
    </div>
    <div class="stream-title">${escHtml(next.title)}</div>
    <div class="stream-date">${dateStr}</div>
    <div class="countdown" id="countdown">--:--:--</div>
    <div class="countdown-label">hours · minutes · seconds</div>
    <div class="btn-row">
      <a href="${next.url}" target="_blank" rel="noopener" class="btn btn-primary">
        ↗ Set a reminder on YouTube
      </a>
      <a href="${DISCORD}" target="_blank" rel="noopener" class="btn btn-discord">
        ⬡ Join my Discord
      </a>
    </div>
    ${upcomingHTML}
  `;

  startCountdown(next.scheduledStart);

  // Wire accordion
  const toggle = document.getElementById('upcoming-toggle');
  if (toggle) {
    toggle.addEventListener('click', () => {
      accordionOpen = !accordionOpen;
      toggle.classList.toggle('open', accordionOpen);
      document.getElementById('upcoming-list').classList.toggle('visible', accordionOpen);
    });
  }
}

// ── STATE D: LIVE ─────────────────────────────────────────────────────────
function renderLive(stream) {
  clearCountdown();

  const elapsed  = Date.now() - new Date(stream.actualStart).getTime();
  const minutes  = Math.floor(elapsed / 60000);
  const elapsedStr = minutes < 2
    ? 'just started'
    : minutes < 60
      ? `started ${minutes} minutes ago`
      : `started ${Math.floor(minutes / 60)}h ${minutes % 60}m ago`;

  document.getElementById('content').innerHTML = `
    <div class="live-badge">
      <span class="dot dot-live"></span>
      Live now
    </div>
    <div class="stream-title">${escHtml(stream.title)}</div>
    <div class="live-sub">${elapsedStr}</div>
    <div class="btn-row">
      <a href="${stream.url}" target="_blank" rel="noopener" class="btn btn-green">
        ▶ Watch on YouTube
      </a>
      <a href="${DISCORD}" target="_blank" rel="noopener" class="btn btn-discord">
        ⬡ Discuss on Discord
      </a>
    </div>
  `;
}

// ── COUNTDOWN TIMER ───────────────────────────────────────────────────────
function startCountdown(isoTime) {
  const target = new Date(isoTime).getTime();

  function tick() {
    const diff = target - Date.now();
    const el   = document.getElementById('countdown');
    if (!el) return;

    if (diff <= 0) {
      el.textContent = '00:00:00';
      clearCountdown();
      // Refetch — stream might be going live
      setTimeout(fetchAndRender, 5000);
      return;
    }

    const totalSec = Math.floor(diff / 1000);
    const hours    = Math.floor(totalSec / 3600);
    const minutes  = Math.floor((totalSec % 3600) / 60);
    const seconds  = totalSec % 60;

    // Hours: no leading zero. Minutes+seconds: always two digits.
    el.textContent =
      `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  }

  tick();
  countdownInterval = setInterval(tick, 1000);
}

function clearCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

// ── DATE FORMATTING ───────────────────────────────────────────────────────
function formatDate(isoTime) {
  return new Date(isoTime).toLocaleString(navigator.language, {
    weekday: 'short',
    day:     'numeric',
    month:   'long',
    year:    'numeric',
    hour:    '2-digit',
    minute:  '2-digit',
    timeZoneName: 'short',
  });
}

function formatDateShort(isoTime) {
  return new Date(isoTime).toLocaleString(navigator.language, {
    weekday: 'short',
    day:     'numeric',
    month:   'short',
    hour:    '2-digit',
    minute:  '2-digit',
  });
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
