<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gear — Glnnk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #c8ff00;
      --accent-dim: rgba(200,255,0,0.08);
      --radius: 6px;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* HEADER */
    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .site-title {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .site-title span { color: var(--accent); }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-top: 8px;
    }

    .header-note {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
      text-align: right;
    }

    /* REGION SELECTOR */
    .region-bar {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .region-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .region-buttons {
      display: flex;
      gap: 8px;
    }

    .region-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.08em;
    }

    .region-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .region-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .region-flag { margin-right: 5px; }

    /* MAIN LAYOUT */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 40px 0;
    }

    /* CATEGORY */
    .category {
      margin-bottom: 56px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
    }

    .category-header h2 {
      font-size: 11px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .category-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .toggle-icon {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .category.collapsed .toggle-icon { transform: rotate(-90deg); }
    .category.collapsed .product-grid { display: none; }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* PRODUCT CARD */
    .product-card {
      background: var(--bg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.15s;
      position: relative;
    }

    .product-card:hover { background: var(--surface); }

    .product-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .product-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }

    .product-links {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .buy-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .buy-btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .buy-btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .buy-btn-primary:hover {
      opacity: 0.85;
      color: #000;
    }

    /* Tag for non-region specific */
    .tag-global {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
    }

    /* FOOTER */
    footer {
      margin-top: 80px;
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      header, .region-bar, main, footer { padding-left: 20px; padding-right: 20px; }
      h1 { font-size: 40px; }
      .header-note { text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <a href="/" class="site-title">glnnk<span>.art</span></a>
    <h1>Gear</h1>
  </div>
  <p class="header-note">
    Links marked with ★ are referral links — you pay nothing extra, I get a small cut.
  </p>
</header>

<div class="region-bar">
  <span class="region-label">Region</span>
  <div class="region-buttons">
    <button class="region-btn active" data-region="DE">🇩🇪 DE</button>
    <button class="region-btn" data-region="US">🇺🇸 US</button>
    <button class="region-btn" data-region="UK">🇬🇧 UK</button>
  </div>
</div>

<main id="app"></main>

<footer>
  Updated regularly. Prices & availability vary by region. ★ = affiliate link.
</footer>

<script>
// ============================================================
//  GEAR DATA — edit this to add/remove products & categories
//  
//  Each product can have:
//    name:     string
//    desc:     string (optional short note)
//    links:    { DE, US, UK }  — region-specific Amazon ref links
//              OR
//    link:     string          — single global link (non-region-specific)
//    ref:      true/false      — is it a referral link? (shows ★)
// ============================================================

const GEAR = [
  {
    category: "📷 Mobile Camera Setup",
    products: [
      {
        name: "DJI Osmo Pocket 3",
        desc: "Main run-and-gun camera. Incredible stabilization.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_OP3",
          US: "https://amzn.to/PLACEHOLDER_US_OP3",
          UK: "https://amzn.to/PLACEHOLDER_UK_OP3",
        }
      },
      {
        name: "DJI Mic 2",
        desc: "Wireless mic system with built-in recorder.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_MIC2",
          US: "https://amzn.to/PLACEHOLDER_US_MIC2",
          UK: "https://amzn.to/PLACEHOLDER_UK_MIC2",
        }
      },
      {
        name: "DJI Mic Mini",
        desc: "Smaller, lighter companion mic option.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_MICMINI",
          US: "https://amzn.to/PLACEHOLDER_US_MICMINI",
          UK: "https://amzn.to/PLACEHOLDER_UK_MICMINI",
        }
      },
      {
        name: "Sony FX3",
        desc: "Primary camera body. Cinema line, full frame.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_FX3",
          US: "https://amzn.to/PLACEHOLDER_US_FX3",
          UK: "https://amzn.to/PLACEHOLDER_UK_FX3",
        }
      },
      {
        name: "Sony A7C II",
        desc: "Compact second body with DJI Mic 2 MI Shoe support.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_A7CII",
          US: "https://amzn.to/PLACEHOLDER_US_A7CII",
          UK: "https://amzn.to/PLACEHOLDER_UK_A7CII",
        }
      },
      {
        name: "Teenage Engineering CM-15",
        desc: "Compact cardioid mic — surprisingly great on desk.",
        ref: false,
        link: "https://teenage.engineering/products/cm-15",
      }
    ]
  },
  {
    category: "🎙️ Streaming & Audio",
    products: [
      {
        name: "Audio Interface (placeholder)",
        desc: "Add your actual interface here.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_AI",
          US: "https://amzn.to/PLACEHOLDER_US_AI",
          UK: "https://amzn.to/PLACEHOLDER_UK_AI",
        }
      },
      {
        name: "Boom Arm (placeholder)",
        desc: "Add your actual boom arm here.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_BOOM",
          US: "https://amzn.to/PLACEHOLDER_US_BOOM",
          UK: "https://amzn.to/PLACEHOLDER_UK_BOOM",
        }
      }
    ]
  },
  {
    category: "💡 Lighting",
    products: [
      {
        name: "Key Light (placeholder)",
        desc: "Add your light here.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_LIGHT",
          US: "https://amzn.to/PLACEHOLDER_US_LIGHT",
          UK: "https://amzn.to/PLACEHOLDER_UK_LIGHT",
        }
      }
    ]
  },
  {
    category: "🎹 Music & Synths",
    products: [
      {
        name: "Eurorack Case (placeholder)",
        desc: "Add your case here.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_CASE",
          US: "https://amzn.to/PLACEHOLDER_US_CASE",
          UK: "https://amzn.to/PLACEHOLDER_UK_CASE",
        }
      },
      {
        name: "Patch Cables (placeholder)",
        desc: "Add your cable brand here.",
        ref: true,
        links: {
          DE: "https://amzn.to/PLACEHOLDER_DE_CABLES",
          US: "https://amzn.to/PLACEHOLDER_US_CABLES",
          UK: "https://amzn.to/PLACEHOLDER_UK_CABLES",
        }
      }
    ]
  }
];

// ============================================================
//  RENDERING
// ============================================================

let currentRegion = localStorage.getItem('gear-region') || 'DE';

function renderAll() {
  const app = document.getElementById('app');
  app.innerHTML = GEAR.map(renderCategory).join('');
  bindToggles();
}

function renderCategory(cat) {
  return `
    <section class="category" data-category="${esc(cat.category)}">
      <div class="category-header">
        <h2>${esc(cat.category)}</h2>
        <span class="toggle-icon">▾</span>
      </div>
      <div class="product-grid">
        ${cat.products.map(renderProduct).join('')}
      </div>
    </section>
  `;
}

function renderProduct(p) {
  const isGlobal = !!p.link;
  const linksHTML = isGlobal
    ? `<span class="tag-global">global link</span>
       <a class="buy-btn buy-btn-primary" href="${p.link}" target="_blank" rel="noopener">
         View →
       </a>`
    : `<a class="buy-btn buy-btn-primary region-link"
         href="${p.links[currentRegion]}"
         target="_blank" rel="noopener"
         data-de="${p.links.DE}"
         data-us="${p.links.US}"
         data-uk="${p.links.UK}">
         ${p.ref ? '★ ' : ''}Buy on Amazon
       </a>`;

  return `
    <div class="product-card">
      <div class="product-name">${esc(p.name)}</div>
      ${p.desc ? `<div class="product-desc">${esc(p.desc)}</div>` : ''}
      <div class="product-links">${linksHTML}</div>
    </div>
  `;
}

function updateRegion(region) {
  currentRegion = region;
  localStorage.setItem('gear-region', region);

  // Update button states
  document.querySelectorAll('.region-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.region === region);
  });

  // Update all region links without re-rendering
  document.querySelectorAll('.region-link').forEach(link => {
    link.href = link.dataset[region.toLowerCase()];
  });
}

function bindToggles() {
  document.querySelectorAll('.category-header').forEach(header => {
    header.addEventListener('click', () => {
      header.closest('.category').classList.toggle('collapsed');
    });
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
//  INIT
// ============================================================

document.querySelectorAll('.region-btn').forEach(btn => {
  btn.addEventListener('click', () => updateRegion(btn.dataset.region));
});

// Set initial active button from saved region
document.querySelectorAll('.region-btn').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.region === currentRegion);
});

renderAll();
</script>
</body>
</html>
